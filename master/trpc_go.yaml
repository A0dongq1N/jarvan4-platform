global:
  namespace: Development
  env_name: dev

server:
  app: master
  server: http
  bin_path: /usr/local/bin/master
  conf_path: ./conf
  data_path: ./data
  service:
    - name: trpc.master.http.api
      ip: 0.0.0.0
      port: 8090
      network: tcp
      protocol: http_no_protocol
      timeout: 30000

    - name: trpc.master.trpc.internal
      ip: 0.0.0.0
      port: 8095
      network: tcp
      protocol: trpc
      timeout: 10000

client:
  timeout: 10000
  service:
    # MySQL — DSN 由 Nacos 配置中心（master.yaml）注入，此处保留本地开发 fallback
    - name: trpc.mysql.master.db
      target: dsn://root:NFTurbo666@tcp(127.0.0.1:3306)/jarvan4?charset=utf8mb4&parseTime=True&loc=Local
      timeout: 5000

    # Redis — 密码由 Nacos 配置中心注入，此处保留本地开发 fallback
    - name: trpc.redis.master.cache
      target: redis://127.0.0.1:6379
      password: "NFTurbo666"
      timeout: 3000

plugins:
  log:
    default:
      - writer: console
        level: debug
        formatter: console
      - writer: file
        level: info
        formatter: json
        writer_config:
          filename: ./log/master.log
          max_size: 100
          max_backups: 3
          max_age: 7
          compress: true
