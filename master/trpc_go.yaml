global:
  namespace: Development
  env_name: dev

server:
  app: master
  server: http
  bin_path: /usr/local/bin/master
  conf_path: ./conf
  data_path: ./data
  service:
    - name: trpc.master.http.api
      ip: 0.0.0.0
      port: 8090
      network: tcp
      protocol: http_no_protocol
      timeout: 30000

    - name: trpc.master.trpc.internal
      ip: 0.0.0.0
      port: 8095
      network: tcp
      protocol: trpc
      timeout: 10000

client:
  timeout: 10000
  service:
    # MySQL — DSN 由 Nacos 配置中心（master.yaml）注入
    # 本地开发请在 Nacos 或环境变量配置真实 DSN，此处仅作占位
    - name: trpc.mysql.master.db
      target: dsn://***
      timeout: 5000

    # Redis — 凭据由 Nacos 配置中心注入，程序直接使用 go-redis 连接，此配置项已不再读取
    - name: trpc.redis.master.cache
      target: redis://127.0.0.1:6379
      timeout: 3000

plugins:
  log:
    default:
      - writer: console
        level: debug
        formatter: console
      - writer: file
        level: info
        formatter: json
        writer_config:
          filename: ./log/master.log
          max_size: 100
          max_backups: 3
          max_age: 7
          compress: true
